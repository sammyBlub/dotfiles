exec-once = portal
exec-once = sleep 1
exec-once = killall -e xdg-desktop-portal-hyprland
exec-once = killall xdg-desktop-portal
exec-once = /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2
exec-once = /usr/lib/xdg-desktop-portal &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = mako
exec-once = awww-daemon
exec-once = sleep 0.5
exec-once = awww img --outputs HDMI-A-1 ~/.config/hypr/hyprpaper.png
exec-once = awww img --outputs eDP-1 ~/.config/hypr/hyprpaper.png
exec-once = hyprctl setcursor Bibata-Modern-Ice 1
exec-once = waybar & nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
